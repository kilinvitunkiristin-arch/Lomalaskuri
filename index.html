<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lomaan aikaa</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f6d6a8;
    color: #241b3a;
  }

  .hero {
    width: 100%;
    height: 36vh;
    min-height: 230px;
    max-height: 380px;
    background: url("tausta.png") center 25% / cover no-repeat;
  }

  .container {
    display: flex;
    justify-content: center;
    margin-top: -25px;
    padding: 0 12px 35px;
  }

  .card {
    background: rgba(255, 248, 238, 0.94);
    border-radius: 26px;
    padding: 26px;
    max-width: 720px;
    width: 100%;
    text-align: center;
    box-shadow: 0 16px 45px rgba(0,0,0,0.24);
  }

  h1 {
    margin: 0 0 8px;
    font-size: clamp(2.2rem, 5vw, 3.2rem);
  }

  .subtitle {
    font-size: 1.2rem;
    margin-bottom: 20px;
  }

  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .box {
    background: #fffaf3;
    border-radius: 18px;
    padding: 17px 8px;
  }

  .number {
    font-size: clamp(2.3rem, 6vw, 3.8rem);
    font-weight: 800;
  }

  .label {
    font-size: 0.85rem;
    font-weight: 700;
  }

  .footer {
    margin-top: 20px;
    font-size: 1.15rem;
  }

  .workdays {
    margin-top: 12px;
    font-size: 1.05rem;
    font-weight: 700;
  }

  @media (max-width: 700px) {
    .hero {
      height: 34vh;
      min-height: 210px;
      background-position: center top;
    }

    .container {
      margin-top: -8px;
      padding-bottom: 25px;
    }

    .card {
      padding: 22px;
      border-radius: 24px;
    }

    h1 {
      font-size: 2.5rem;
    }

    .subtitle {
      font-size: 1.1rem;
      margin-bottom: 16px;
    }

    .countdown {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .box {
      padding: 16px 8px;
    }

    .number {
      font-size: 3rem;
    }

    .label {
      font-size: 0.85rem;
    }

    .footer {
      font-size: 1.15rem;
      margin-top: 20px;
    }

    .workdays {
      margin-top: 12px;
      font-size: 1.05rem;
    }
  }
</style>
</head>

<body>

<div class="hero"></div>

<div class="container">
  <div class="card">
    <h1>Lomaan aikaa</h1>
    <div class="subtitle">Aurinkoa, viiniä ja pastaa odottaa.</div>

    <div class="countdown">
      <div class="box">
        <div class="number" id="days">0</div>
        <div class="label">PÄIVÄÄ</div>
      </div>
      <div class="box">
        <div class="number" id="hours">0</div>
        <div class="label">TUNTIA</div>
      </div>
      <div class="box">
        <div class="number" id="minutes">0</div>
        <div class="label">MINUUTTIA</div>
      </div>
      <div class="box">
        <div class="number" id="seconds">0</div>
        <div class="label">SEKUNTIA</div>
      </div>
    </div>

    <div class="footer" id="message">La dolce vita lähestyy.</div>
    <div class="workdays" id="workdays"></div>
  </div>
</div>

<script>
  const targetDate = new Date("2026-05-14T07:00:00+03:00");

  function countWorkdaysUntil(target) {
    const today = new Date();
    const end = new Date(target);

    today.setHours(0, 0, 0, 0);
    end.setHours(0, 0, 0, 0);

    let workdays = 0;

    for (let d = new Date(today); d < end; d.setDate(d.getDate() + 1)) {
      const day = d.getDay();
      if (day !== 0 && day !== 6) {
        workdays++;
      }
    }

    return workdays;
  }

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      document.querySelector(".card").innerHTML =
        "<h1>🍷 La dolce vita alkaa!</h1><div class='footer'>Nyt saa lähteä.</div>";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;

    const workdays = countWorkdaysUntil(targetDate);
    document.getElementById("workdays").textContent =
      "💼 Työpäiviä jäljellä noin " + workdays;

    if (days < 1) {
      document.getElementById("message").textContent = "🔥 Lähtö tänään!";
    } else if (days < 3) {
      document.getElementById("message").textContent = "😎 Kohta mennään...";
    } else {
      document.getElementById("message").textContent = "La dolce vita lähestyy.";
    }
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
