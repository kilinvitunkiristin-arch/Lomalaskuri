<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lomaan aikaa</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.35)),
        url("tausta.png") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #241b3a;
    }

    .card {
      background: rgba(255, 248, 238, 0.92);
      border-radius: 28px;
      padding: 32px;
      max-width: 760px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 4rem);
    }

    .subtitle {
      font-size: 1.3rem;
      margin-bottom: 28px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .box {
      background: #fffaf3;
      border-radius: 18px;
      padding: 20px 10px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    .number {
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      font-weight: 800;
    }

    .label {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .footer {
      margin-top: 26px;
      font-size: 1.2rem;
    }

    @media (max-width: 600px) {
      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Lomaan aikaa</h1>
    <div class="subtitle">Aurinkoa, viiniä ja pastaa odottaa.</div>

    <div class="countdown">
      <div class="box">
        <div class="number" id="days">0</div>
        <div class="label">PÄIVÄÄ</div>
      </div>
      <div class="box">
        <div class="number" id="hours">0</div>
        <div class="label">TUNTIA</div>
      </div>
      <div class="box">
        <div class="number" id="minutes">0</div>
        <div class="label">MINUUTTIA</div>
      </div>
      <div class="box">
        <div class="number" id="seconds">0</div>
        <div class="label">SEKUNTIA</div>
      </div>
    </div>

    <div class="footer" id="message">La dolce vita lähestyy.</div>
  </div>

  <script>
    const targetDate = new Date("2026-05-14T07:00:00+03:00");

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.querySelector(".card").innerHTML =
          "<h1>Hyvää lomaa! ✈️</h1><div class='footer'>Nyt saa lähteä.</div>";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent = seconds;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
