<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lomaan aikaa</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f6d6a8;
    color: #241b3a;
  }

  /* 🌄 YLÄKUVA */
  .hero {
    width: 100%;
    height: 45vh;
    background: url("tausta.png") center 25% / cover no-repeat;
  }

  /* 📦 SISÄLTÖ */
  .container {
    display: flex;
    justify-content: center;
    margin-top: -60px;
    padding: 0 12px 40px;
  }

  .card {
    background: rgba(255, 248, 238, 0.92);
    border-radius: 28px;
    padding: 26px;
    max-width: 700px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  h1 {
    margin: 0 0 10px;
    font-size: clamp(2rem, 5vw, 3rem);
  }

  .subtitle {
    font-size: 1.2rem;
    margin-bottom: 20px;
  }

  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .box {
    background: #fffaf3;
    border-radius: 18px;
    padding: 16px 10px;
  }

  .number {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
  }

  .label {
    font-size: 0.8rem;
    font-weight: 700;
  }

  .footer {
    margin-top: 20px;
    font-size: 1.1rem;
  }

  /* 📱 MOBIILI */
  @media (max-width: 700px) {
    .hero {
      height: 50vh; /* enemmän kuvaa näkyviin */
      background-position: center 20%;
    }

    .container {
      margin-top: -40px;
    }

    .countdown {
      grid-template-columns: repeat(2, 1fr);
    }

    .card {
      padding: 22px;
    }

    .subtitle {
      font-size: 1.1rem;
    }
  }
</style>
</head>

<body>

<div class="hero"></div>

<div class="container">
  <div class="card">
    <h1>Lomaan aikaa</h1>
    <div class="subtitle">Aurinkoa, viiniä ja pastaa odottaa.</div>

    <div class="countdown">
      <div class="box">
        <div class="number" id="days">0</div>
        <div class="label">PÄIVÄÄ</div>
      </div>
      <div class="box">
        <div class="number" id="hours">0</div>
        <div class="label">TUNTIA</div>
      </div>
      <div class="box">
        <div class="number" id="minutes">0</div>
        <div class="label">MINUUTTIA</div>
      </div>
      <div class="box">
        <div class="number" id="seconds">0</div>
        <div class="label">SEKUNTIA</div>
      </div>
    </div>

    <div class="footer" id="message">La dolce vita lähestyy.</div>
  </div>
</div>

<script>
  const targetDate = new Date("2026-05-14T07:00:00+03:00");

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      document.querySelector(".card").innerHTML =
        "<h1>🍷 La dolce vita alkaa!</h1>";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;

    // pieni fiilislogiikka 😄
    if (days < 1) {
      document.getElementById("message").textContent = "🔥 Lähtö tänään!";
    } else if (days < 3) {
      document.getElementById("message").textContent = "😎 Kohta mennään...";
    }
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
