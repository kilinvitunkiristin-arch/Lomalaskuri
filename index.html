<style>
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background:
      linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.35)),
      url("tausta.png") center / cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #241b3a;
  }

  .card {
    background: rgba(255, 248, 238, 0.92);
    border-radius: 28px;
    padding: 32px;
    max-width: 760px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  h1 {
    margin: 0 0 10px;
    font-size: clamp(2rem, 5vw, 4rem);
  }

  .subtitle {
    font-size: 1.3rem;
    margin-bottom: 28px;
  }

  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  .box {
    background: #fffaf3;
    border-radius: 18px;
    padding: 20px 10px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
  }

  .number {
    font-size: clamp(2.2rem, 6vw, 4.5rem);
    font-weight: 800;
  }

  .label {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .footer {
    margin-top: 26px;
    font-size: 1.2rem;
  }

  /* 📱 Mobiilioptimointi */
  @media (max-width: 700px) {
    body {
      background:
        linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.25)),
        url("tausta.png") center top / contain no-repeat,
        #f6d6a8;
      align-items: flex-start;
      padding-top: 30px;
    }

    .card {
      margin-top: 260px; /* säädä tätä tarvittaessa */
      width: 88%;
      padding: 22px;
    }

    .countdown {
      grid-template-columns: repeat(2, 1fr);
    }

    .subtitle {
      font-size: 1.1rem;
    }
  }
</style>
